  </g>

  <!-- Linha vertical sutil separando texto e moto (desktop ~40%) -->
  <line x1="768" y1="80" x2="768" y2="1000" stroke="white" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="4 12"/>
</svg>
