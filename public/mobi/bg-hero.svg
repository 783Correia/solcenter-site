<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Radial glow verde direita (onde fica a moto) -->
    <radialGradient id="gr" cx="72%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#00a651" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00a651" stop-opacity="0"/>
    </radialGradient>
    <!-- Radial glow azul-verde esquerda -->
    <radialGradient id="gl" cx="18%" cy="30%" r="38%">
      <stop offset="0%" stop-color="#003d1f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#003d1f" stop-opacity="0"/>
    </radialGradient>
    <!-- Dot grid -->
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1.2" fill="white" opacity="0.06"/>
    </pattern>
    <!-- Line grid diagonal sutil -->
    <pattern id="lines" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 120 L120 0" stroke="white" stroke-width="0.4" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base escuro -->
  <rect width="1920" height="1080" fill="#050c1a"/>

  <!-- Glows -->
  <rect width="1920" height="1080" fill="url(#gr)"/>
  <rect width="1920" height="1080" fill="url(#gl)"/>

  <!-- Dot grid -->
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <!-- Line grid -->
  <rect width="1920" height="1080" fill="url(#lines)"/>

  <!-- Círculos concêntricos elétricos (centro da moto lado direito) -->
  <g transform="translate(1380, 580)" opacity="0.12">
    <circle r="160" fill="none" stroke="#00a651" stroke-width="1"/>
    <circle r="280" fill="none" stroke="#00a651" stroke-width="0.8"/>
    <circle r="420" fill="none" stroke="#00a651" stroke-width="0.6"/>
    <circle r="580" fill="none" stroke="#00a651" stroke-width="0.4"/>
  </g>

  <!-- Linha horizontal sutil no meio -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Marca d'água Solcenter icon (flor/sol) — muito sutil, lado direito -->
